version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: restaurant-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: restaurant_platform
    healthcheck:
      test: echo "rs.status().ok" | mongosh --quiet --eval "rs.status().ok" | grep -q 1
      interval: 5s
      retries: 40
      start_period: 10s
    volumes:
      - mongo_data:/data/db

  mongo-setup:
    image: mongo:7
    container_name: restaurant-mongo-setup
    depends_on:
      - mongodb
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        sleep 5 &&
        mongosh --host mongodb:27017 --quiet --eval "
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'localhost:27017' }]
          });
        " &&
        echo "Replica set initialized"

  mongo-express:
    image: mongo-express:latest
    container_name: restaurant-mongo-express
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
    depends_on:
      - mongodb

volumes:
  mongo_data:
