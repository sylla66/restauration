version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: restaurant-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_DATABASE: restaurant_platform
    healthcheck:
      test: echo "rs.status().ok" | mongosh --quiet --eval "rs.status().ok" | grep -q 1
      interval: 5s
      retries: 40
      start_period: 10s
    volumes:
      - mongo_data:/data/db

  mongo-setup:
    image: mongo:7
    container_name: restaurant-mongo-setup
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - bash
      - -c
      - |
        mongosh --host mongodb:27017 --quiet --eval "
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'localhost:27017' }]
          });
        "

  backend:
    build:
      context: ./backend
    container_name: restaurant-backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mongodb://mongodb:27017/restaurant_platform?directConnection=true"
      JWT_SECRET: "change-me-in-production"
      CORS_ORIGIN: "http://localhost:80"
      PORT: "3000"
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: restaurant-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data:
